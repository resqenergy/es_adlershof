
raw_dir: .

elements:
  - path: s3://resq/resq_demands/preprocessed/kww_technikkatalog.csv
    scenario: "scenario_2035"
  - path: s3://resq/resq_demands/preprocessed/kww_technikkatalog_capacity_cost.csv
    scenario: "scenario_2035"
  - path: s3://resq/resq_demands/preprocessed/solar_thermal_parameters.csv
    column_mapping:
      scenario_key: scenario
    scenario: "scenario_2035"
  - path: s3://resq/resq_demands/preprocessed/solar_thermal_capacity_cost.csv
    column_mapping:
      scenario_key: scenario
    scenario: "scenario_2035"
  - path: s3://resq/resq_demands/results/total_demands.csv
    column_mapping:
      year_climate: scenario
    scenario: "2035_mean_rcp85"
  - path: s3://resq/resq_demands/results/wasteheat/capacity.csv
    scenario: "2035_mean_rcp85"

sequences:
  - path: s3://resq/resq_demands/results/wasteheat/cop_2035.csv
    sequence_name: heatpumps_profile
  - path: s3://resq/resq_demands/results/wasteheat/2035_mean_rcp85.csv
    sequence_name: heatpumps_profile
  - path: s3://resq/resq_demands/results/demand_profiles/2035_mean_rcp85.csv
    sequence_name: demands_profile
  - path: s3://resq/resq_demands/results/volatile_profiles/pv_timeseries-try_mean_rcp85-2035.csv
    sequence_name: volatile_profile
    column_mapping:
      pv_facade: pv_facade-profile
      pv_roof: pv_roof-profile
  - path: s3://resq/resq_demands/results/solar_thermal_collector/solar_thermal_power_try_mean_rcp85.p2.csv
    sequence_name: volatile_profile
    column_mapping:
      solar_thermal_power: heat_lt_central-solarthermal-profile
