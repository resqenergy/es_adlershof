
raw_dir: .

elements:
  - path: s3://resqenergy/datasets/technology_cost/kww_technikkatalog.csv
    scenario: "scenario_2035"
  - path: s3://resqenergy/datasets/technology_capacity_cost/kww_technikkatalog_capacity_cost.csv
    scenario: "scenario_2035"
  - path: s3://resqenergy/raw/solar_thermal/solar_thermal_parameters.csv
    column_mapping:
      scenario_key: scenario
    scenario: "scenario_2035"
  - path: s3://resqenergy/datasets/solar_thermal/solar_thermal_capacity_cost.csv
    column_mapping:
      scenario_key: scenario
    scenario: "scenario_2035"
  - path: s3://resqenergy/datasets/demand_profiles/total_demands.csv
    column_mapping:
      year_climate: scenario
    scenario: "2035_mean_rcp85"
  - path: s3://resqenergy/datasets/wasteheat_capacity/capacity.csv
    scenario: "2035_mean_rcp85"

sequences:
  - path: s3://resqenergy/datasets/wasteheat_cop/cop_2035.csv
    sequence_name: heatpumps_profile
  - path: s3://resqenergy/datasets/wasteheat_profiles/2035_mean_rcp85.csv
    sequence_name: heatpumps_profile
  - path: s3://resqenergy/datasets/demand_profiles/2035_mean_rcp85.csv
    sequence_name: demands_profile
  - path: s3://resqenergy/datasets/solar_thermal_profiles/solar_thermal_profile_try_mean_rcp85.p2.csv
    sequence_name: volatile_profile
    column_mapping:
      solar_thermal_power: heat_lt_central-solarthermal-profile
  - path: s3://resqenergy/datasets/wind_profiles/wind_timeseries-try_mean_rcp85.p2-2035.csv
    sequence_name: volatile_profile
    column_mapping:
      wind_profile: wind-profile
  - path: s3://resqenergy/datasets/pv_profiles/pv_timeseries-try_mean_rcp85-2035.csv
    sequence_name: volatile_profile
    column_mapping:
      pv_facade: pv_facade-profile
      pv_roof: pv_roof-profile
