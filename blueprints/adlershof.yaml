timeindex:
  start: 2035-01-01 00:00:00
  periods: 8760
  format: "%Y-%m-%d %H:%M:%S"

elements:
  heatpumps:
    component: heatpump
    instances:
      - name: heatpump_mt
        from_bus: electricity
        to_bus: heat_central
        expandable: True
      - name: heatpump_office
        from_bus: electricity
        to_bus: heat_central
        expandable: True
      - name: heatpump_nt
        from_bus: electricity
        to_bus: heat_central
        expandable: True
      - name: heatpump_air
        from_bus: electricity
        to_bus: heat_decentral
        expandable: True
    sequences:
      - efficiency

  flh_heatpumps:
    component: flh_heatpump
    instances:
      - name: heatpump_geothermal
        from_bus: electricity
        to_bus: heat_central
        expandable: True
      - name: heatpump_wastewater
        from_bus: electricity
        to_bus: heat_central
        expandable: True
      - name: heatpump_canal
        from_bus: electricity
        to_bus: heat_central
        expandable: True
    sequences:
      - efficiency

  pth:
    component: conversion
    instances:
      - name: pth
        from_bus: electricity
        to_bus: heat_central
        expandable: True

  volatile:
    component: volatile
    instances:
      - name: pv_roof
        bus: electricity
        expandable: True
      - name: pv_facade
        bus: electricity
        expandable: True
      - name: wind
        bus: electricity
        expandable: True
      - name: heat_lt_central-solarthermal
        bus: heat_lt_central
        expandable: True
      - name: heat_decentral-solarthermal
        bus: heat_decentral
        expandable: True
      - name: heat_central-heat_recovery
        bus: heat_central
        expandable: True
      - name: heat_lt_central-heat_recovery
        bus: heat_lt_central
        expandable: True

  storages:
    component: storage
    instances:
      - name: battery_small
        bus: electricity
        expandable: True
      - name: battery_large
        bus: electricity
        expandable: True
      - name: storage_aquifer
        bus: heat_central
        expandable: True
      - name: storage_pressure
        bus: heat_central
        expandable: True
      - name: storage_buffer
        bus: heat_decentral
        expandable: True

  conversion:
    component: conversion
    instances:
      - name: heat_central-gas_boiler
        from_bus: gas
        to_bus: heat_central
        expandable: True
      - name: heat_decentral-gas_boiler
        from_bus: gas
        to_bus: heat_decentral
        expandable: True
      - name: cool-absorption
        from_bus: electricity
        to_bus: cool
        expandable: True
      - name: cool-compression
        from_bus: electricity
        to_bus: cool
        expandable: True

  backpressures:
    component: backpressure
    instances:
      - name: bhkw
        fuel_bus: gas
        electricity_bus: electricity
        heat_bus: heat_central
        expandable: True
      - name: gasturbine
        fuel_bus: gas
        electricity_bus: electricity
        heat_bus: heat_central
        expandable: True

  demands:
    component: load
    instances:
      - name: electricity-residential-demand
        bus: electricity
        profile: electricity-residential
      - name: electricity-non_residential-demand
        bus: electricity
        profile: electricity-non_residential
      - name: heat_central-residential-demand
        bus: heat_central
        profile: heat_central-residential
      - name: heat_central-non_residential-demand
        bus: heat_central
        profile: heat_central-non_residential
      - name: heat_lt_central-residential-demand
        bus: heat_lt_central
        profile: heat_low_temp_central-residential
      - name: heat_decentral-residential-demand
        bus: heat_decentral
        profile: heat_decentral-residential
      - name: heat_decentral-non_residential-demand
        bus: heat_decentral
        profile: heat_decentral-non_residential
      - name: cool-residential-demand
        bus: cool
        profile: cool-residential
      - name: cool-non_residential-demand
        bus: cool
        profile: cool-non_residential

  imports:
    component: shortage
    instances:
      - name: electricity-import
        bus: electricity
        capacity: 1000000000
      - name: gas-import
        bus: gas
        capacity: 1000000000
      - name: heat_central-import
        bus: heat_central
        capacity: 1000000000

  exports:
    component: excess
    instances:
      - name: electricity-export
        bus: electricity
        capacity: 1000000000
      - name: heat_central-export
        bus: heat_central
        capacity: 1000000000
