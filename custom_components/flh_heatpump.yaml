
busses:
  - from_bus
  - to_bus

sequences:

attributes:
  region:
    type: str
    unit: n/a
    description: Country code
  name:
    type: str
    unit: n/a
    description: Name
  type:
    type: str
    unit: n/a
    description: Type
  carrier:
    type: str
    unit: n/a
    description: Energy carrier
  tech:
    type: str
    unit: n/a
    description: Technology
  from_bus:
    type: str
    unit: n/a
    description: The input bus this component is connected to
  to_bus:
    type: str
    unit: n/a
    description: The output bus this component is connected to
  full_load_time_max:
    type: float
    unit: MWh
    description: Limit output flow by max outflow
  capacity:
    type: float
    unit: MW
    description: Installed capacity
  capacity_cost:
    type: float
    unit: Eur/MW
    description: Annualized costs of capacity expansion
  efficiency:
    type: float
    unit: unitless
    description: Efficiency of the conversion biomass to electricity
  carrier_cost:
    type: float
    unit: Eur/MWh
    description: Cost per unit of used fuel
  marginal_cost:
    type: float
    unit: Eur/MWh
    description: Marginal cost
  expandable:
    type: boolean
    unit: n/a
    description: Capacity can be expanded
  capacity_potential:
    type: float
    unit: MW
    description: Maximum invest capacity in unit of output capacity
